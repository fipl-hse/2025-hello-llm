<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Emotion detection</title>

  <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">
  <script defer src="{{ url_for('static', path='main.js') }}"></script>
</head>

<body>
  <div class="container">
    <h1>Emotion detection</h1>

    <div class="card">
      <label for="question">Input</label>
      <textarea id="question" rows="4" placeholder="Type your query..."></textarea>

      <button id="infer-btn">Detect</button>

      <label for="answer">Output</label>
      <pre id="answer"></pre>

      <div id="status" class="status"></div>
    </div>
  </div>
</body>
</html>
